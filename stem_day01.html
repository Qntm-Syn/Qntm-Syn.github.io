<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STEM — First Post</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;600;700&family=Space+Mono:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Rajdhani', sans-serif;
  }

  .post {
    width: 1080px;
    height: 1080px;
    background: #000;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* Scattered dots like the logo */
  .dots-layer {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  .dot {
    position: absolute;
    border-radius: 50%;
    background: #e8274b;
    opacity: 0;
    animation: flicker var(--dur) ease-in-out infinite var(--delay);
  }

  @keyframes flicker {
    0%, 100% { opacity: 0; transform: scale(0.5); }
    50% { opacity: var(--op); transform: scale(1); }
  }

  /* Glowing center halo */
  .halo {
    position: absolute;
    width: 700px;
    height: 280px;
    background: radial-gradient(ellipse, rgba(232,39,75,0.08) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    animation: halo-pulse 4s ease-in-out infinite;
  }

  @keyframes halo-pulse {
    0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scaleX(1); }
    50% { opacity: 1; transform: translate(-50%, -50%) scaleX(1.05); }
  }

  /* Top label */
  .top-label {
    position: absolute;
    top: 80px;
    left: 0;
    right: 0;
    text-align: center;
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    letter-spacing: 6px;
    color: #e8274b;
    text-transform: uppercase;
    opacity: 0;
    animation: fade-up 1s ease forwards 0.3s;
  }

  /* Logo area */
  .logo-wrap {
    position: relative;
    margin-bottom: 60px;
    opacity: 0;
    animation: fade-up 1s ease forwards 0.6s;
  }

  .logo-text {
    font-family: 'Rajdhani', sans-serif;
    font-size: 120px;
    font-weight: 700;
    letter-spacing: 0;
    color: #fff;
    display: flex;
    align-items: center;
    gap: 18px;
    text-transform: uppercase;
  }

  .e-custom {
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 10px;
    width: 72px;
    height: 88px;
    position: relative;
    top: -4px;
  }

  .e-bar {
    height: 14px;
    background: #e8274b;
    border-radius: 2px;
    transform: scaleX(0);
    animation: bar-in 0.5s ease forwards;
  }
  .e-bar:nth-child(1) { animation-delay: 1.1s; }
  .e-bar:nth-child(2) { width: 80%; animation-delay: 1.25s; }
  .e-bar:nth-child(3) { animation-delay: 1.4s; }

  @keyframes bar-in {
    to { transform: scaleX(1); }
  }

  /* Tagline */
  .tagline {
    font-family: 'Space Mono', monospace;
    font-size: 15px;
    font-weight: 400;
    color: rgba(255,255,255,0.45);
    letter-spacing: 3px;
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 56px;
    opacity: 0;
    animation: fade-up 1s ease forwards 1.6s;
  }

  /* Divider line */
  .divider {
    width: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, #e8274b, transparent);
    margin-bottom: 56px;
    animation: expand-line 1s ease forwards 1.9s;
  }

  @keyframes expand-line {
    to { width: 340px; }
  }

  /* Main caption */
  .caption {
    max-width: 720px;
    text-align: center;
    opacity: 0;
    animation: fade-up 1s ease forwards 2.2s;
  }

  .caption-main {
    font-size: 30px;
    font-weight: 600;
    color: #fff;
    line-height: 1.45;
    letter-spacing: 1px;
    margin-bottom: 24px;
  }

  .caption-main em {
    color: #e8274b;
    font-style: normal;
  }

  .caption-sub {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: rgba(255,255,255,0.38);
    letter-spacing: 2px;
    line-height: 1.8;
  }

  /* Bottom bar */
  .bottom-bar {
    position: absolute;
    bottom: 72px;
    left: 0;
    right: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 32px;
    opacity: 0;
    animation: fade-up 1s ease forwards 2.7s;
  }

  .pill {
    border: 1px solid rgba(232,39,75,0.4);
    border-radius: 2px;
    padding: 8px 22px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
  }

  .pill.accent {
    background: #e8274b;
    border-color: #e8274b;
    color: #fff;
  }

  /* Corner accent lines */
  .corner {
    position: absolute;
    width: 40px;
    height: 40px;
    border-color: rgba(232,39,75,0.5);
    border-style: solid;
  }
  .corner.tl { top: 40px; left: 40px; border-width: 2px 0 0 2px; }
  .corner.tr { top: 40px; right: 40px; border-width: 2px 2px 0 0; }
  .corner.bl { bottom: 40px; left: 40px; border-width: 0 0 2px 2px; }
  .corner.br { bottom: 40px; right: 40px; border-width: 0 2px 2px 0; }

  @keyframes fade-up {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Scanline overlay */
  .scanlines {
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent,
      transparent 3px,
      rgba(0,0,0,0.04) 3px,
      rgba(0,0,0,0.04) 4px
    );
    pointer-events: none;
  }
</style>
</head>
<body>
<div class="post">

  <!-- Corner accents -->
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <!-- Ambient glow -->
  <div class="halo"></div>

  <!-- Scattered dots -->
  <div class="dots-layer" id="dots"></div>

  <!-- Scanlines texture -->
  <div class="scanlines"></div>

  <!-- Top label -->
  <div class="top-label">Day 01 &nbsp;/&nbsp; The Beginning</div>

  <!-- Logo -->
  <div class="logo-wrap">
    <div class="logo-text">
      <span>S</span><span>T</span>
      <div class="e-custom">
        <div class="e-bar"></div>
        <div class="e-bar"></div>
        <div class="e-bar"></div>
      </div>
      <span>M</span>
    </div>
  </div>

  <!-- Tagline -->
  <div class="tagline">Something is being built</div>

  <!-- Divider -->
  <div class="divider"></div>

  <!-- Caption -->
  <div class="caption">
    <div class="caption-main">
      Every great thing starts with a <em>signal</em><br>
      buried in the noise.
    </div>
    <div class="caption-sub">
      This is where ours begins. &nbsp;·&nbsp; Follow the journey.
    </div>
  </div>

  <!-- Bottom pills -->
  <div class="bottom-bar">
    <div class="pill">In Development</div>
    <div class="pill accent">V1 — Coming Soon</div>
    <div class="pill">Join the Journey</div>
  </div>

</div>

<script>
  // Generate scattered dots matching the logo aesthetic
  const layer = document.getElementById('dots');
  const positions = [
    [12,38],[18,52],[25,44],[8,60],[30,30],[40,22],[55,18],[65,25],[72,20],[80,30],
    [88,22],[92,40],[95,55],[90,68],[85,75],[78,80],[70,85],[60,82],[48,88],[38,80],
    [28,78],[15,70],[10,62],[20,72],[35,68],[50,72],[62,70],[75,72],[82,65],[88,58],
    [15,35],[25,28],[45,15],[58,12],[70,16],[83,28],[90,45],[85,60],[70,78],[55,84],
    [42,84],[30,74],[18,60],[12,48],[22,40],[38,32],[52,20],[68,22],[80,38],[88,52]
  ];

  positions.forEach(([x, y]) => {
    const d = document.createElement('div');
    d.className = 'dot';
    const size = Math.random() * 4 + 2;
    const dur = (Math.random() * 4 + 2).toFixed(1) + 's';
    const delay = (Math.random() * 5).toFixed(1) + 's';
    const op = (Math.random() * 0.5 + 0.3).toFixed(2);
    d.style.cssText = `
      left:${x}%; top:${y}%;
      width:${size}px; height:${size}px;
      --dur:${dur}; --delay:${delay}; --op:${op};
    `;
    layer.appendChild(d);
  });
</script>
</body>
</html>
